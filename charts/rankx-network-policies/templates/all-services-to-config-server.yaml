{{- if .Values.services.config.enabled }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-services-to-config-server
  namespace: {{ include "rankx.namespace" . }}

  labels:
    {{- include "rankx.networkpolicy.labels" . | nindent 4 }}

spec:
  # Apply policy to config-server pods only
  podSelector:
    matchLabels:
      app.kubernetes.io/component: config
      tier: infra

  policyTypes:
    - Ingress

  ingress:
    - from:

        # Allow all backend application pods
        - podSelector:
            matchLabels:
              tier: app
              app.kubernetes.io/component: backend

        # Allow API Gateway pods
        - podSelector:
            matchLabels:
              tier: edge
              app.kubernetes.io/component: gateway

      ports:
        - protocol: TCP
          port: {{ .Values.services.config.port }}

{{- end }}