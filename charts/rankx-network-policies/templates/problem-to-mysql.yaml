# ===================================================
# Allow problem-service -> problem mysql database
# Render only if problem-service + problem-db enabled
# ===================================================
{{- if and .Values.services.problem.enabled .Values.database.problem.enabled }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: problem-to-mysql
  namespace: {{ include "rankx.namespace" . }}

  labels:
    {{- include "rankx.networkpolicy.labels" . | nindent 4 }}

spec:
  # Apply policy only to problem database pods
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mysql-problem-service
      tier: data
      app.kubernetes.io/component: db

  policyTypes:
    - Ingress

  ingress:
    - from:
        # Only problem-service may connect
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: problem-service
              tier: app
              app.kubernetes.io/component: backend

      ports:
        - protocol: TCP
          port: {{ .Values.database.problem.port }}

{{- end }}