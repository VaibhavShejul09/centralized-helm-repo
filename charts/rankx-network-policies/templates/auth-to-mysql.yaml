# ===================================================
# Allow auth-service -> auth mysql database
# Render only if auth-service + auth-db enabled
# ===================================================
{{- if and .Values.services.auth.enabled .Values.database.auth.enabled }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: auth-to-mysql
  namespace: {{ include "rankx.namespace" . }}

  labels:
    {{- include "rankx.networkpolicy.labels" . | nindent 4 }}

spec:
  # Apply policy to auth database pods only
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mysql-auth-service
      tier: data
      app.kubernetes.io/component: db

  policyTypes:
    - Ingress

  ingress:
    - from:
        # Only auth-service pods may connect
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-service
              tier: app
              app.kubernetes.io/component: backend

      ports:
        - protocol: TCP
          port: {{ .Values.database.auth.port }}

{{- end }}