{{- if eq .Values.kind "StatefulSet" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  labels:
{{ include "microservice.labels" . | nindent 4 }}

  {{- if .Values.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.syncWave }}"
  {{- end }}

spec:
  serviceName: {{ .Values.serviceName | default .Values.name }}
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name | quote }}

  template:
    metadata:
      labels:
{{ include "microservice.labels" . | nindent 8 }}
    spec:


      {{- with .Values.securityContext.pod }}
      securityContext:
      {{ toYaml . | nindent 8 }}
      {{- end }}

      containers:
      - name: {{ .Values.name }}-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.service.port }}

        {{- with .Values.securityContext.container }}
        securityContext:
        {{ toYaml . | nindent 10 }}
        {{- end }}

        {{- with .Values.resources }}
        resources:
        {{ toYaml . | nindent 10 }}
        {{- end }}


        {{- if or .Values.secret .Values.config }}
        env:
        {{- if .Values.secret }}
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.name }}-secret
              key: MYSQL_ROOT_PASSWORD
        {{- end }}

        {{- if .Values.config }}
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.name }}-config
              key: MYSQL_DATABASE
        {{- end }}
        {{- end }}

        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: {{ .Values.persistence.name | default "mysql-data" }}
          mountPath: {{ .Values.persistence.mountPath | default "/var/lib/mysql" }}
        {{- end }}

        {{- with .Values.startupProbe }}
        startupProbe:
          exec:
            command: {{ toYaml .exec | nindent 12 }}
          periodSeconds: {{ .periodSeconds | default 10 }}
          failureThreshold: {{ .failureThreshold | default 30 }}
        {{- end }}

        livenessProbe:
          exec:
            command: {{ toYaml .Values.livenessProbe.exec | nindent 12 }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}

        readinessProbe:
          exec:
            command: {{ toYaml .Values.readinessProbe.exec | nindent 12 }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: {{ .Values.persistence.name | default "mysql-data" }}
      labels:
  {{ include "microservice.labels" . | nindent 6 }}    
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: {{ .Values.persistence.storageClass | default "gp3" }}
      resources:
        requests:
          storage: {{ .Values.persistence.size | default "5Gi" }}
  {{- end }}

{{- end }}

