{{- if .Values.redis.enabled }}

apiVersion: v1
kind: Service

metadata:
  name: redis

  labels:
    {{- include "rankx.redis.labels" . | nindent 4 }}

spec:
  # Headless service for StatefulSet stable DNS
  clusterIP: None

  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP

  selector:
    {{- include "rankx.redis.selectorLabels" . | nindent 4 }}

{{- end }}
